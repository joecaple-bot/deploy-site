<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Overview</title>
<style>
:root{--bg:#090807;--panel:#15120f;--panel2:#211a13;--line:#5f4526;--text:#f7ecd5;--muted:#bca985;--accent:#d99a3f;--green:#6fc48a;--danger:#d66b5f;--shadow:0 24px 90px rgba(0,0,0,.55)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,rgba(172,95,28,.18),transparent 34%),linear-gradient(135deg,#070706,#12100d 50%,#090807);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
button,input,textarea,select{font:inherit}button{border:1px solid rgba(217,154,63,.45);border-radius:8px;background:linear-gradient(180deg,#2a2118,#14110e);color:var(--text);padding:8px 11px;cursor:pointer}button.primary{background:linear-gradient(180deg,#8d5a22,#533514);border-color:#d99a3f}.danger{border-color:rgba(214,107,95,.65);color:#ffd4cf}
header{height:58px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid rgba(217,154,63,.28);background:rgba(8,7,6,.86);position:sticky;top:0;z-index:2;box-shadow:0 12px 40px rgba(0,0,0,.35)}
h1{font-family:Georgia,'Times New Roman',serif;font-size:19px;margin:0 auto 0 0;color:#ffe7b3}.badge{font-size:11px;color:#d9c59b;border:1px solid rgba(217,154,63,.32);border-radius:999px;padding:5px 9px}
main{display:grid;grid-template-columns:330px 1fr 360px;gap:14px;padding:14px;min-height:calc(100vh - 58px)}section{border:1px solid rgba(217,154,63,.28);border-radius:14px;background:linear-gradient(180deg,rgba(31,25,18,.92),rgba(13,12,11,.96));box-shadow:var(--shadow);padding:14px;min-height:0;overflow:auto}
.portal-board{position:relative;padding:38px 42px;border-radius:14px;display:flex;flex-direction:column;background:
  linear-gradient(rgba(20,16,12,.58),rgba(20,16,12,.68)),
  url("assets/ui/campaign_overview_frame.webp") center/100% 100% no-repeat,
  linear-gradient(180deg,rgba(31,25,18,.92),rgba(13,12,11,.96));box-shadow:var(--shadow);color:var(--text)}
.portal-board:before{content:"";position:absolute;inset:14px;border-radius:10px;pointer-events:none;box-shadow:inset 0 0 75px rgba(0,0,0,.35)}
.portal-board>*{position:relative;z-index:1}
.portal-board h2{color:#ffe7b3;text-shadow:0 1px 0 rgba(0,0,0,.55)}
.portal-board .tabs{transform:rotate(-.35deg);transform-origin:left center}
.portal-board .tabs button{background:rgba(20,15,10,.78);color:#d9c59b;border-color:rgba(202,151,74,.35);box-shadow:0 3px 0 rgba(0,0,0,.18)}
.portal-board .tabs button.active{background:rgba(105,57,18,.58);color:#fff1cd;border-color:#d99a3f}
.scrap-editor,.scrap-note{position:relative;background:
  linear-gradient(rgba(255,238,190,.68),rgba(234,196,125,.78)),
  url("assets/ui/torn_paper_texture.webp") center/100% 100% no-repeat;
  color:#2a1a0d;box-shadow:0 18px 38px rgba(0,0,0,.36),0 2px 8px rgba(84,45,12,.24);padding:20px 22px;margin:14px 0 18px;border-radius:14px;
  -webkit-mask-image:url("assets/ui/torn_paper_mask.png");mask-image:url("assets/ui/torn_paper_mask.png");
  -webkit-mask-size:100% 100%;mask-size:100% 100%;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat}
@supports not ((mask-image:url("")) or (-webkit-mask-image:url(""))){
  .scrap-editor,.scrap-note{border:1px solid rgba(115,72,28,.28);border-radius:12px}
}
.scrap-editor{transform:rotate(-.35deg);min-height:210px}.scrap-note:nth-child(odd){transform:rotate(-1.1deg)}.scrap-note:nth-child(even){transform:rotate(.85deg)}
.scrap-editor:before,.scrap-note:before{content:"";position:absolute;left:42%;top:3px;width:76px;height:20px;background:rgba(238,215,167,.76);box-shadow:0 2px 7px rgba(67,39,12,.18);transform:translateY(-50%) rotate(-4deg);z-index:2}
.scrap-note:after{content:"";position:absolute;right:22px;top:18px;width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#df6957,#8d1c18 62%,#4b0d0c);box-shadow:0 5px 10px rgba(66,24,8,.28),inset 0 0 0 2px rgba(255,225,160,.12);opacity:.74}
.portal-board textarea,.portal-board input{background:rgba(255,244,215,.78);color:#2a1a0d;border-color:rgba(92,57,25,.34);box-shadow:inset 0 1px 8px rgba(91,58,21,.1)}
.scrap-editor textarea,.scrap-editor input{background:rgba(255,250,229,.42);border-color:rgba(92,57,25,.2)}
.portal-board textarea::placeholder,.portal-board input::placeholder{color:rgba(62,40,19,.58)}
.portal-board .primary{background:linear-gradient(180deg,#b97425,#7b4315);color:#fff3d1;border-color:#9e672a}
.portal-board .card{position:relative;background:rgba(255,239,197,.78);color:#2b1a0e;border-color:rgba(100,62,24,.25)}
.portal-board .meta,.portal-board p{color:#5b3d20}
.note-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}.note-toolbar .meta{margin-left:auto}
.note-board{position:relative;min-height:calc(100vh - 226px);flex:1;border:1px solid rgba(217,154,63,.22);border-radius:12px;background:radial-gradient(circle at 40% 28%,rgba(88,57,22,.2),transparent 42%),rgba(8,7,6,.16);overflow:hidden;cursor:default}
.note-board.placing{cursor:copy}.note-board.drawing{cursor:crosshair}
.note-board .board-hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border:1px solid rgba(217,154,63,.4);border-radius:999px;background:rgba(15,12,8,.72);color:#ffe7b3;padding:9px 13px;font-size:12px;opacity:0;transition:opacity .15s ease;pointer-events:none}
.note-board.placing .board-hint{opacity:.95}
.board-world{position:absolute;left:0;top:0;width:2600px;height:1800px;transform-origin:0 0;background-image:linear-gradient(rgba(255,227,168,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,227,168,.08) 1px,transparent 1px);background-size:80px 80px}
.board-drawings{position:absolute;inset:0;width:2600px;height:1800px;overflow:visible;pointer-events:none}
.board-drawings polyline{fill:none;stroke:#2d1609;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 1px 0 rgba(255,235,180,.16))}
.sticky-note{position:absolute;width:230px;min-height:172px;padding:18px 18px 34px;background:linear-gradient(rgba(255,238,190,.72),rgba(234,196,125,.84)),url("assets/ui/torn_paper_texture.webp") center/100% 100% no-repeat;color:#2a1a0d;box-shadow:0 18px 38px rgba(0,0,0,.38),0 2px 8px rgba(84,45,12,.24);border-radius:12px;cursor:default;-webkit-mask-image:url("assets/ui/torn_paper_mask.png");mask-image:url("assets/ui/torn_paper_mask.png");-webkit-mask-size:100% 100%;mask-size:100% 100%;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat}
.sticky-note.quest{background:linear-gradient(rgba(255,239,176,.78),rgba(227,190,95,.86)),url("assets/ui/torn_paper_texture.webp") center/100% 100% no-repeat}.sticky-note.npc{background:linear-gradient(rgba(206,232,255,.74),rgba(131,178,210,.84)),url("assets/ui/torn_paper_texture.webp") center/100% 100% no-repeat}.sticky-note.loot{background:linear-gradient(rgba(237,218,255,.74),rgba(170,127,206,.84)),url("assets/ui/torn_paper_texture.webp") center/100% 100% no-repeat}.sticky-note.warning{background:linear-gradient(rgba(255,201,180,.76),rgba(213,111,83,.84)),url("assets/ui/torn_paper_texture.webp") center/100% 100% no-repeat}.sticky-note.lore{background:linear-gradient(rgba(210,244,198,.74),rgba(135,184,114,.84)),url("assets/ui/torn_paper_texture.webp") center/100% 100% no-repeat}
.sticky-note{transition:filter .18s ease,box-shadow .18s ease}
.sticky-note:hover{filter:drop-shadow(0 0 22px rgba(255,188,76,.42));box-shadow:0 24px 52px rgba(0,0,0,.42),0 0 46px rgba(255,174,74,.2),0 2px 8px rgba(84,45,12,.24)}
.sticky-note:hover:after{opacity:.95}
.sticky-note.dragging{animation:noteSway .58s ease-in-out infinite alternate;z-index:20;filter:drop-shadow(0 0 28px rgba(255,196,90,.55))}
.sticky-note:before{content:"";position:absolute;left:50%;top:3px;width:70px;height:18px;background:rgba(238,215,167,.8);box-shadow:0 2px 7px rgba(67,39,12,.18);transform:translate(-50%,-50%) rotate(-4deg);z-index:2}
.sticky-note input,.sticky-note textarea,.sticky-note select{background:rgba(255,250,229,.5);border-color:rgba(92,57,25,.22);color:#2a1a0d}.sticky-note input{font-weight:800;margin-bottom:7px}.sticky-note textarea{min-height:92px;resize:none}.sticky-note select{width:auto;position:absolute;left:14px;bottom:10px;font-size:10px;padding:4px 6px;border-radius:8px}.sticky-note button{font-size:10px;padding:4px 7px;background:rgba(71,38,15,.78)}
.note-drag,.note-front{position:absolute;top:13px;z-index:3;border:1px solid rgba(92,57,25,.34);border-radius:999px;background:rgba(255,244,215,.74);color:#3b210f;font-size:10px;padding:4px 7px;user-select:none}.note-drag{right:13px;cursor:grab}.note-front{right:64px;cursor:pointer}.note-drag:active{cursor:grabbing}
.note-remove{position:absolute;right:13px;bottom:10px}.note-resize{position:absolute;right:7px;bottom:7px;width:15px;height:15px;border-right:3px solid rgba(62,32,11,.62);border-bottom:3px solid rgba(62,32,11,.62);cursor:nwse-resize}
@keyframes noteSway{from{rotate:-1.8deg;scale:1.015}to{rotate:1.8deg;scale:1.025}}
@supports not ((mask-image:url("")) or (-webkit-mask-image:url(""))){
  .sticky-note{border:1px solid rgba(115,72,28,.28);border-radius:12px}
}
h2{font-family:Georgia,'Times New Roman',serif;font-size:15px;margin:0 0 10px;color:#ffe7b3}.card{border:1px solid rgba(217,154,63,.2);border-radius:10px;background:rgba(9,10,12,.5);padding:10px;margin-bottom:9px}.name{font-weight:800}.meta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{font-size:11px;color:var(--muted)}.stat b{display:block;color:var(--text);font-size:15px}
textarea,input{width:100%;border:1px solid rgba(217,154,63,.25);border-radius:9px;background:#0c0f13;color:var(--text);padding:10px}textarea{min-height:130px;resize:vertical;line-height:1.45}.row{display:flex;gap:8px;align-items:center;margin-bottom:10px}.row>*{flex:1}.tabs{display:flex;gap:7px;margin-bottom:10px}.tabs button{font-size:12px}.tabs button.active{border-color:#d99a3f;color:#ffe7b3}.hidden{display:none}.list{max-height:360px;overflow:auto}.session-title{display:flex;justify-content:space-between;gap:8px}.toast{position:fixed;right:18px;bottom:18px;display:none;border:1px solid rgba(111,196,138,.7);background:#132118;color:#eaffef;border-radius:9px;padding:10px 12px;font-size:12px}.toast.show{display:block}
@media(max-width:1050px){main{grid-template-columns:1fr}section{max-height:none}}
</style>
</head>
<body>
<header>
  <h1>Campaign Overview</h1>
  <span class="badge" id="campaign-badge"></span>
  <button onclick="goMap()">Map</button>
  <button onclick="goBuilder()">Characters</button>
  <button onclick="goManager()">Campaigns</button>
  <button id="role-btn" onclick="toggleRole()">Role</button>
</header>
<main>
  <section>
    <h2>Characters</h2>
    <div id="characters"></div>
    <h2 style="margin-top:18px">NPCs & Scene Pieces</h2>
    <div id="npcs"></div>
  </section>
  <section class="portal-board">
    <div class="tabs">
      <button id="tab-public" class="active" onclick="setTab('public')">Player Notes</button>
      <button id="tab-recaps" onclick="setTab('recaps')">Recaps</button>
      <button id="tab-timeline" onclick="setTab('timeline')">Timeline</button>
      <button id="tab-sessions" onclick="setTab('sessions')">Saved Sessions</button>
      <button id="tab-dm" onclick="setTab('dm')">DM Notes</button>
    </div>
    <div id="panel-public">
      <h2>Campaign Notes</h2>
      <div class="note-toolbar">
        <button id="add-note-btn" class="primary" onclick="toggleAddNoteMode()">Add note</button>
        <button id="draw-btn" onclick="toggleDrawMode()">Draw</button>
        <button onclick="clearDrawings()">Clear drawings</button>
        <button onclick="savePortal()">Save board</button>
        <div class="meta" id="note-mode-label">Move/edit notes freely. Middle mouse pans.</div>
      </div>
      <div id="note-board" class="note-board" onclick="createBoardNote(event)" onpointerdown="boardPointerDown(event)">
        <div class="board-hint">Click a spot to pin the new note</div>
        <div id="board-world" class="board-world">
          <svg id="board-drawings" class="board-drawings"></svg>
          <div id="board-notes"></div>
        </div>
      </div>
    </div>
    <div id="panel-recaps" class="hidden">
      <h2>Add Recap</h2>
      <div class="scrap-editor">
        <div class="row"><input id="recap-title" placeholder="Session title"><button class="primary" onclick="addRecap()">Add recap</button></div>
        <textarea id="recap-body" placeholder="What happened last time?"></textarea>
      </div>
      <h2>Recaps</h2><div id="recaps" class="list"></div>
    </div>
    <div id="panel-timeline" class="hidden">
      <h2>Campaign Timeline</h2>
      <div id="timeline" class="list"></div>
    </div>
    <div id="panel-sessions" class="hidden">
      <h2>Saved Sessions</h2>
      <div id="sessions" class="list"></div>
    </div>
    <div id="panel-dm" class="hidden">
      <h2>DM Session Notes</h2>
      <div class="scrap-editor">
        <textarea id="dm-notes" placeholder="Private DM prep, secrets, encounter changes, loot plans..."></textarea>
        <div class="row"><input id="session-title" placeholder="Session name"><button class="primary" onclick="saveSession()">Save session log</button></div>
        <button onclick="savePortal()">Save DM notes</button>
      </div>
    </div>
  </section>
  <section>
    <h2>Current State</h2>
    <div class="grid" id="state-cards"></div>
    <h2 style="margin-top:18px">Latest Chat / Table Log</h2>
    <div id="chat" class="list"></div>
  </section>
</main>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://timefqpkuuiggxysjqap.supabase.co';
const SUPABASE_PUBLIC_KEY='sb_publishable__Z5nLiiYOeBdD4GRzgx7OA_7E2yMtKH';
const CLOUD_TABLE='campaign_states';
const STORAGE_PREFIX='fogOfWarDnDCharacterCreator.v1';
const CLOUD_CAMPAIGN_KEY='fogOfWarDnDCampaignId.v1';
const CAMPAIGN_UNLOCK_PREFIX='fogOfWarCampaignUnlock.v1';
const CLOUD_CAMPAIGN_ID=new URLSearchParams(location.search).get('campaign')||localStorage.getItem(CLOUD_CAMPAIGN_KEY)||'default-campaign';
localStorage.setItem(CLOUD_CAMPAIGN_KEY,CLOUD_CAMPAIGN_ID);
const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_PUBLIC_KEY);
const OVERVIEW_ART='assets/ui/torn_paper_texture.webp';
const OVERVIEW_MASK='assets/ui/torn_paper_mask.png';
let state={};
let role=localStorage.getItem(roleKey())||'player';
let tab='public';
let draggedNoteId='';
let dragNoteOffset={x:0,y:0};
let addNoteMode=false;
let drawMode=false;
let boardView={x:0,y:0};
let boardPan=null;
let drawingStroke=null;
let resizeNoteState=null;
const BOARD_W=2600, BOARD_H=1800;
const NOTE_CATEGORIES=['plain','quest','npc','loot','warning','lore'];
function storageKey(){return `${STORAGE_PREFIX}:${CLOUD_CAMPAIGN_ID}`}
function roleKey(){return `${STORAGE_PREFIX}:role:${CLOUD_CAMPAIGN_ID}`}
function unlockKey(){return `${CAMPAIGN_UNLOCK_PREFIX}:${CLOUD_CAMPAIGN_ID}`}
function portal(){
  state.campaignPortal=state.campaignPortal||{};
  state.campaignPortal={publicNotes:'',notes:[],drawings:[],dmNotes:'',recaps:[],sessions:[],timeline:[],stats:{},...state.campaignPortal};
  if(state.campaignPortal.publicNotes&&!state.campaignPortal.notes.length){
    state.campaignPortal.notes=[{id:'note_'+Date.now(),title:'Campaign Notes',body:state.campaignPortal.publicNotes,x:260,y:220,w:260,h:190,category:'plain',z:1,rot:-1}];
    state.campaignPortal.publicNotes='';
  }
  state.campaignPortal.notes=(state.campaignPortal.notes||[]).map((note,i)=>normalizeNote(note,i));
  state.campaignPortal.drawings=Array.isArray(state.campaignPortal.drawings)?state.campaignPortal.drawings:[];
  return state.campaignPortal;
}
function normalizeNote(note={},i=0){
  const x=Number(note.x);
  const y=Number(note.y);
  return {
    id:note.id||'note_'+Date.now()+Math.random().toString(36).slice(2,5),
    title:note.title||'New Note',
    body:note.body||'',
    x:x<=100 ? Math.round((x/100)*BOARD_W) : Math.max(0,Math.min(BOARD_W-180,x||220)),
    y:y<=100 ? Math.round((y/100)*BOARD_H) : Math.max(0,Math.min(BOARD_H-140,y||180)),
    w:Math.max(180,Math.min(520,Number(note.w)||230)),
    h:Math.max(145,Math.min(480,Number(note.h)||172)),
    category:NOTE_CATEGORIES.includes(note.category)?note.category:'plain',
    z:Number(note.z)||i+1,
    rot:Number(note.rot)||0
  };
}
function isDM(){return role==='dm'}
function toggleRole(){role=isDM()?'player':'dm';localStorage.setItem(roleKey(),role);render()}
function setTab(next){tab=next;if(next==='dm'&&!isDM()) tab='public';render()}
function campaignQuery(){return '?campaign='+encodeURIComponent(CLOUD_CAMPAIGN_ID)}
function goMap(){location.href='map.html'+campaignQuery()}
function goBuilder(){location.href='character_builder.html'+campaignQuery()}
function openCharacterSheet(id){
  location.href='character_builder.html'+campaignQuery()+'&character='+encodeURIComponent(id)+(isDM()?'&dmEdit=1':'');
}
function goManager(){location.href='campaign_manager.html'+campaignQuery()}
async function loadState(){
  try{const raw=localStorage.getItem(storageKey());if(raw) state=JSON.parse(raw)}catch(e){}
  const {data}=await client.from(CLOUD_TABLE).select('state').eq('id',CLOUD_CAMPAIGN_ID).maybeSingle();
  if(data?.state){
    if(!hasAccess(data.state)) return goManager();
    state=data.state;
    try{localStorage.setItem(storageKey(),JSON.stringify(state))}catch(e){}
  }
  render();
}
function hasAccess(nextState){const hash=nextState.campaign?.passwordHash;return !hash||localStorage.getItem(unlockKey())===hash}
async function savePortal(renderAfter=true){
  portal().notes=Array.isArray(portal().notes)?portal().notes:[];
  if(isDM()) portal().dmNotes=document.getElementById('dm-notes')?.value||portal().dmNotes||'';
  portal().updatedAt=new Date().toISOString();
  try{localStorage.setItem(storageKey(),JSON.stringify(state))}catch(e){}
  await client.from(CLOUD_TABLE).upsert({id:CLOUD_CAMPAIGN_ID,state,updated_by:'campaign-overview',updated_at:new Date().toISOString()});
  toast('Campaign overview saved');
  if(renderAfter) render();
}
function schedulePortalSave(){
  clearTimeout(schedulePortalSave.t);
  schedulePortalSave.t=setTimeout(()=>savePortal(false),650);
}
function toggleAddNoteMode(force=null){
  addNoteMode=force===null?!addNoteMode:!!force;
  if(addNoteMode&&drawMode) toggleDrawMode(false);
  const board=document.getElementById('note-board');
  const btn=document.getElementById('add-note-btn');
  const label=document.getElementById('note-mode-label');
  board?.classList.toggle('placing',addNoteMode);
  if(btn) btn.textContent=addNoteMode?'Cancel note':'Add note';
  if(label) label.textContent=addNoteMode?'Click the board where this note should land.':'Move/edit notes freely.';
}
function toggleDrawMode(force=null){
  drawMode=force===null?!drawMode:!!force;
  if(drawMode&&addNoteMode) toggleAddNoteMode(false);
  const board=document.getElementById('note-board');
  const btn=document.getElementById('draw-btn');
  const label=document.getElementById('note-mode-label');
  board?.classList.toggle('drawing',drawMode);
  if(btn) btn.textContent=drawMode?'Stop drawing':'Draw';
  if(label) label.textContent=drawMode?'Draw on the board with left mouse. Middle mouse still pans.':'Move/edit notes freely. Middle mouse pans.';
}
function boardToWorld(clientX,clientY){
  const rect=document.getElementById('note-board').getBoundingClientRect();
  return {x:clientX-rect.left-boardView.x,y:clientY-rect.top-boardView.y};
}
function createBoardNote(event){
  if(!addNoteMode) return;
  if(event.target.closest('.sticky-note')) return;
  const pos=boardToWorld(event.clientX,event.clientY);
  const x=Math.max(0,Math.min(BOARD_W-230,pos.x));
  const y=Math.max(0,Math.min(BOARD_H-172,pos.y));
  const p=portal();
  const z=1+Math.max(0,...(p.notes||[]).map(n=>Number(n.z)||0));
  p.notes=[...(p.notes||[]),{id:'note_'+Date.now()+Math.random().toString(36).slice(2,5),title:'New Note',body:'',x,y,w:230,h:172,category:'plain',z,rot:(Math.random()*4-2).toFixed(2)}].slice(-80);
  toggleAddNoteMode(false);
  renderScrapbookNotes(p);
  schedulePortalSave();
}
function updateBoardNote(id,field,value){
  const p=portal();
  p.notes=(p.notes||[]).map(note=>note.id===id?{...note,[field]:value}:note);
  schedulePortalSave();
}
function bringNoteToFront(id){
  const p=portal();
  const top=1+Math.max(0,...(p.notes||[]).map(note=>Number(note.z)||0));
  p.notes=(p.notes||[]).map(note=>note.id===id?{...note,z:top}:note);
  renderScrapbookNotes(p);
  schedulePortalSave();
}
function deleteBoardNote(id){
  const p=portal();
  p.notes=(p.notes||[]).filter(note=>note.id!==id);
  renderScrapbookNotes(p);
  schedulePortalSave();
}
function startNoteDrag(event,id){
  event.stopPropagation();
  draggedNoteId=id;
  const note=(portal().notes||[]).find(n=>n.id===id)||{};
  const pos=boardToWorld(event.clientX,event.clientY);
  dragNoteOffset={x:pos.x-(Number(note.x)||0),y:pos.y-(Number(note.y)||0)};
  document.querySelector(`[data-note-id="${CSS.escape(id)}"]`)?.classList.add('dragging');
  document.addEventListener('pointermove',dragBoardNote);
  document.addEventListener('pointerup',stopNoteDrag,{once:true});
}
function dragBoardNote(event){
  if(!draggedNoteId) return;
  const pos=boardToWorld(event.clientX,event.clientY);
  const note=(portal().notes||[]).find(n=>n.id===draggedNoteId)||{};
  const x=Math.max(0,Math.min(BOARD_W-(Number(note.w)||230),pos.x-dragNoteOffset.x));
  const y=Math.max(0,Math.min(BOARD_H-(Number(note.h)||172),pos.y-dragNoteOffset.y));
  const p=portal();
  p.notes=(p.notes||[]).map(note=>note.id===draggedNoteId?{...note,x,y}:note);
  const noteEl=document.querySelector(`[data-note-id="${CSS.escape(draggedNoteId)}"]`);
  if(noteEl){noteEl.style.left=x+'px';noteEl.style.top=y+'px';}
}
function stopNoteDrag(){
  if(draggedNoteId) document.querySelector(`[data-note-id="${CSS.escape(draggedNoteId)}"]`)?.classList.remove('dragging');
  if(draggedNoteId) schedulePortalSave();
  draggedNoteId='';
  document.removeEventListener('pointermove',dragBoardNote);
}
function startNoteResize(event,id){
  event.stopPropagation();
  const note=(portal().notes||[]).find(n=>n.id===id);
  if(!note) return;
  resizeNoteState={id,startX:event.clientX,startY:event.clientY,w:Number(note.w)||230,h:Number(note.h)||172};
  document.addEventListener('pointermove',resizeBoardNote);
  document.addEventListener('pointerup',stopNoteResize,{once:true});
}
function resizeBoardNote(event){
  if(!resizeNoteState) return;
  const w=Math.max(180,Math.min(520,resizeNoteState.w+event.clientX-resizeNoteState.startX));
  const h=Math.max(145,Math.min(480,resizeNoteState.h+event.clientY-resizeNoteState.startY));
  const p=portal();
  p.notes=(p.notes||[]).map(note=>note.id===resizeNoteState.id?{...note,w,h}:note);
  const el=document.querySelector(`[data-note-id="${CSS.escape(resizeNoteState.id)}"]`);
  if(el){el.style.width=w+'px';el.style.minHeight=h+'px';}
}
function stopNoteResize(){
  if(resizeNoteState) schedulePortalSave();
  resizeNoteState=null;
  document.removeEventListener('pointermove',resizeBoardNote);
}
function boardPointerDown(event){
  if(event.button===1){
    event.preventDefault();
    boardPan={startX:event.clientX,startY:event.clientY,x:boardView.x,y:boardView.y};
    document.addEventListener('pointermove',panBoard);
    document.addEventListener('pointerup',stopBoardPan,{once:true});
    return;
  }
  if(drawMode && event.button===0 && !event.target.closest('.sticky-note')){
    event.preventDefault();
    const pos=boardToWorld(event.clientX,event.clientY);
    drawingStroke={id:'draw_'+Date.now()+Math.random().toString(36).slice(2,5),points:[[Math.round(pos.x),Math.round(pos.y)]]};
    portal().drawings=[...(portal().drawings||[]),drawingStroke].slice(-80);
    renderDrawings();
    document.addEventListener('pointermove',drawBoardStroke);
    document.addEventListener('pointerup',stopBoardStroke,{once:true});
  }
}
function panBoard(event){
  if(!boardPan) return;
  boardView.x=boardPan.x+event.clientX-boardPan.startX;
  boardView.y=boardPan.y+event.clientY-boardPan.startY;
  applyBoardView();
}
function stopBoardPan(){
  boardPan=null;
  document.removeEventListener('pointermove',panBoard);
}
function applyBoardView(){
  const world=document.getElementById('board-world');
  if(world) world.style.transform=`translate(${boardView.x}px,${boardView.y}px)`;
}
function drawBoardStroke(event){
  if(!drawingStroke) return;
  const pos=boardToWorld(event.clientX,event.clientY);
  drawingStroke.points.push([Math.round(pos.x),Math.round(pos.y)]);
  renderDrawings();
}
function stopBoardStroke(){
  drawingStroke=null;
  document.removeEventListener('pointermove',drawBoardStroke);
  schedulePortalSave();
}
function clearDrawings(){
  if(!confirm('Clear all board drawings?')) return;
  portal().drawings=[];
  renderDrawings();
  schedulePortalSave();
}
function addRecap(){
  const title=document.getElementById('recap-title').value.trim()||`Recap ${new Date().toLocaleDateString()}`;
  const body=document.getElementById('recap-body').value.trim();
  if(!body) return toast('Write a recap first');
  portal().recaps=[{id:'recap_'+Date.now(),title,body,createdAt:new Date().toISOString(),author:isDM()?'DM':'Player'},...(portal().recaps||[])].slice(0,40);
  document.getElementById('recap-title').value='';document.getElementById('recap-body').value='';
  savePortal();
}
function saveSession(){
  if(!isDM()) return toast('DM mode required');
  const title=document.getElementById('session-title').value.trim()||`Session ${new Date().toLocaleDateString()}`;
  const body=document.getElementById('dm-notes').value.trim();
  portal().sessions=[{id:'session_'+Date.now(),title,body,createdAt:new Date().toISOString(),chat:(state.chatMessages||[]).slice(-30)},...(portal().sessions||[])].slice(0,50);
  savePortal();
}
function render(){
  document.getElementById('campaign-badge').textContent='Campaign: '+CLOUD_CAMPAIGN_ID;
  document.getElementById('role-btn').textContent='Role: '+(isDM()?'DM':'Player');
  ['public','recaps','timeline','sessions','dm'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('active',tab===t);document.getElementById('panel-'+t).classList.toggle('hidden',tab!==t)});
  document.getElementById('tab-dm').style.display=isDM()?'':'none';
  const p=portal();
  document.getElementById('dm-notes').value=p.dmNotes||'';
  renderScrapbookNotes(p);
  renderDrawings();
  applyBoardView();
  const chars=(state.partyCharacters||state.myCharacters||[]).filter(Boolean);
  document.getElementById('characters').innerHTML=chars.map(ch=>`<button class="card" style="display:block;width:100%;text-align:left" onclick="openCharacterSheet('${esc(ch.id)}')"><div class="name">${esc(ch.icon||'') } ${esc(ch.name||'Character')}</div><div class="meta">L${ch.level||1} ${esc(ch.race||'')} ${esc(ch.class||'')} · HP ${ch.currentHP??ch.derived?.HP??'-'}/${ch.derived?.HP??'-'} · AC ${ch.derived?.AC??'-'} · ${isDM()?'Open/edit sheet':(ch.owner?'Open sheet':'Local sheet')}</div></button>`).join('')||'<div class="meta">No characters yet.</div>';
  const npcs=(state.placedIcons||[]).filter(x=>['enemy','trader','chest'].includes(x.kind));
  document.getElementById('npcs').innerHTML=npcs.map(n=>`<div class="card"><div class="name">${esc(n.icon||n.em||'')} ${esc(n.name||n.label||n.kind)}</div><div class="meta">${esc(n.kind||'icon')} ${n.hp!=null?`· HP ${n.hp}/${n.maxHP||n.hp} · AC ${n.ac||'-'}`:''}</div></div>`).join('')||'<div class="meta">No NPCs or scene pieces yet.</div>';
  document.getElementById('state-cards').innerHTML=[
    ['Characters',chars.length],['NPCs',npcs.length],['Boss Kills',p.stats?.bossKills||0],['Enemies Down',p.stats?.enemiesDefeated||0],['Gold Found',(p.stats?.goldFound||0)+' gp'],['Notable Loot',p.stats?.notableLoot||0],['Damage Dealt',p.stats?.damageDealt||0],['Healing Done',p.stats?.healingDone||0]
  ].map(([a,b])=>`<div class="card stat"><b>${b}</b>${a}</div>`).join('');
  document.getElementById('recaps').innerHTML=(p.recaps||[]).map(r=>`<div class="scrap-note"><div class="session-title"><div class="name">${esc(r.title)}</div><div class="meta">${new Date(r.createdAt).toLocaleString()}</div></div><div class="meta">${esc(r.author||'Player')}</div><p>${esc(r.body)}</p></div>`).join('')||'<div class="meta">No recaps yet.</div>';
  document.getElementById('timeline').innerHTML=(p.timeline||[]).map(e=>`<div class="scrap-note"><div class="session-title"><div class="name">${esc(e.title)}</div><div class="meta">${new Date(e.time).toLocaleString()}</div></div><div class="meta">${esc(e.actor||'Table')} ${e.rarity?`· ${esc(e.rarity)}`:''}</div><p>${esc(e.detail||'')}</p></div>`).join('')||'<div class="meta">No campaign events logged yet.</div>';
  document.getElementById('sessions').innerHTML=(p.sessions||[]).map(s=>`<div class="scrap-note"><div class="session-title"><div class="name">${esc(s.title)}</div><div class="meta">${new Date(s.createdAt).toLocaleString()}</div></div><p>${esc(s.body||'No notes')}</p><div class="meta">${(s.chat||[]).length} chat lines saved</div></div>`).join('')||'<div class="meta">No saved sessions yet.</div>';
  document.getElementById('chat').innerHTML=(state.chatMessages||[]).slice(-25).reverse().map(m=>`<div class="card"><div class="meta">${esc(m.time||'')}</div><div><b>${esc(m.character||'Table')}</b>: ${esc(m.label||m.text||'')}</div>${m.detail?`<div class="meta">${esc(m.detail)}</div>`:''}</div>`).join('')||'<div class="meta">No chat yet.</div>';
}
function renderScrapbookNotes(p=portal()){
  const el=document.getElementById('board-notes');
  if(!el) return;
  el.innerHTML=(p.notes||[]).map(note=>`
    <div class="sticky-note ${esc(note.category||'plain')}" data-note-id="${esc(note.id)}" style="left:${Number(note.x)||10}px;top:${Number(note.y)||10}px;width:${Number(note.w)||230}px;min-height:${Number(note.h)||172}px;z-index:${Number(note.z)||1};transform:rotate(${Number(note.rot)||0}deg)" onclick="event.stopPropagation()">
      <span class="note-front" onclick="event.stopPropagation();bringNoteToFront('${note.id}')">Top</span>
      <span class="note-drag" onpointerdown="startNoteDrag(event,'${note.id}')">Move</span>
      <input value="${esc(note.title||'')}" placeholder="Title" oninput="updateBoardNote('${note.id}','title',this.value)">
      <textarea placeholder="Body" oninput="updateBoardNote('${note.id}','body',this.value)">${esc(note.body||'')}</textarea>
      <select onchange="updateBoardNote('${note.id}','category',this.value)">${NOTE_CATEGORIES.map(cat=>`<option value="${cat}" ${cat===(note.category||'plain')?'selected':''}>${cat}</option>`).join('')}</select>
      <button class="note-remove" onclick="event.stopPropagation();deleteBoardNote('${note.id}')">Remove</button>
      <span class="note-resize" onpointerdown="startNoteResize(event,'${note.id}')"></span>
    </div>`).join('');
}
function renderDrawings(){
  const svg=document.getElementById('board-drawings');
  if(!svg) return;
  svg.setAttribute('viewBox',`0 0 ${BOARD_W} ${BOARD_H}`);
  svg.innerHTML=(portal().drawings||[]).map(stroke=>`<polyline points="${(stroke.points||[]).map(p=>`${Number(p[0])||0},${Number(p[1])||0}`).join(' ')}"></polyline>`).join('');
}
function toast(message){const el=document.getElementById('toast');el.textContent=message;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1800)}
function esc(value){return String(value??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function warmOverviewArtCache(){
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  if('caches' in window) caches.open('dnd-campaign-assets-v1').then(cache=>cache.addAll([OVERVIEW_ART,OVERVIEW_MASK]).catch(()=>{}));
}
warmOverviewArtCache();
loadState();
</script>
</body>
</html>
